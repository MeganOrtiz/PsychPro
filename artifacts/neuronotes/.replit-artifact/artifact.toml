kind = "web"
previewPath = "/"
title = "PsychPro"
version = "1.0.0"
id = "artifacts/neuronotes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21281

[services.development]
run = "pnpm --filter @workspace/neuronotes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neuronotes", "run", "build" ]
publicDir = "artifacts/neuronotes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21281"
BASE_PATH = "/"
