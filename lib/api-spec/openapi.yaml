openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NeuroNotes API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: topics
    description: Neuroscience topics
  - name: flashcards
    description: Flashcard study mode
  - name: quizzes
    description: Quiz study mode
  - name: studyGuides
    description: Study guides
  - name: practiceExams
    description: Practice exams
  - name: progress
    description: User progress tracking
  - name: users
    description: User profile and onboarding
  - name: subscription
    description: Subscription management
  - name: dashboard
    description: Dashboard summary data
  - name: leaderboard
    description: Leaderboard rankings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /topics:
    get:
      operationId: getTopics
      tags: [topics]
      summary: List all topics
      responses:
        "200":
          description: List of neuroscience topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"

  /topics/{topicId}:
    get:
      operationId: getTopic
      tags: [topics]
      summary: Get a single topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
        "404":
          description: Topic not found

  /topics/{topicId}/flashcards:
    get:
      operationId: getFlashcardsByTopic
      tags: [flashcards]
      summary: Get flashcards for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of flashcards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flashcard"

  /topics/{topicId}/quizzes:
    get:
      operationId: getQuizzesByTopic
      tags: [quizzes]
      summary: Get quiz questions for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of quiz questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizQuestion"

  /topics/{topicId}/study-guide:
    get:
      operationId: getStudyGuideByTopic
      tags: [studyGuides]
      summary: Get the study guide for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Study guide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyGuide"
        "404":
          description: Study guide not found

  /topics/{topicId}/practice-exam:
    get:
      operationId: getPracticeExamByTopic
      tags: [practiceExams]
      summary: Get a practice exam for a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
        - name: count
          in: query
          required: false
          description: "How many questions the client wants. Server clamps to availableCount and to 50."
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Practice exam with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeExam"
        "404":
          description: Exam not found

  /courses/{category}/mastery-status:
    get:
      operationId: getCourseMasteryStatus
      tags: [practiceExams]
      summary: Get unlock/mastery status for a course
      description: "Returns whether the Course Mastery Exam is unlocked (every lesson's practice exam passed at >= 90%) plus per-lesson best practice-exam scores and whether the course has been mastered."
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course mastery status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMasteryStatus"
        "404":
          description: Course not found

  /courses/{category}/mastery-exam:
    get:
      operationId: getCourseMasteryExam
      tags: [practiceExams]
      summary: Get the course mastery exam for a category
      description: "Aggregates quiz questions across every topic in the category. Requires that EVERY lesson's practice exam has been passed at >= 90%, otherwise returns 403."
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course mastery exam with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMasteryExam"
        "403":
          description: Course not yet unlocked
        "404":
          description: Course or questions not found

  /course-mastery-attempts:
    post:
      operationId: recordCourseMasteryAttempt
      tags: [progress]
      summary: Record a completed course mastery exam attempt for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordCourseMasteryAttemptBody"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseMasteryAttemptRecord"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get the current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found

    post:
      operationId: upsertUserProfile
      tags: [users]
      summary: Create or update user profile (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserProfileBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/usage:
    get:
      operationId: getUserUsage
      tags: [users]
      summary: Get usage count for free trial tracking
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageInfo"

    post:
      operationId: incrementUserUsage
      tags: [users]
      summary: Increment usage count (called when viewing a flashcard or answering a quiz question)
      responses:
        "200":
          description: Updated usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageInfo"

  /progress:
    get:
      operationId: getUserProgress
      tags: [progress]
      summary: Get progress for all topics for the current user
      responses:
        "200":
          description: List of topic progress records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicProgress"

  /progress/{topicId}:
    get:
      operationId: getTopicProgress
      tags: [progress]
      summary: Get progress for a specific topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicProgress"
        "404":
          description: Progress not found

    post:
      operationId: updateTopicProgress
      tags: [progress]
      summary: Update progress for a specific topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTopicProgressBody"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicProgress"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for the current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top users by topics completed and streak
      responses:
        "200":
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaderboard"

  /quiz-attempts:
    post:
      operationId: recordQuizAttempt
      tags: [progress]
      summary: Record a completed quiz attempt for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAttemptBody"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptRecord"

  /exam-attempts:
    post:
      operationId: recordExamAttempt
      tags: [progress]
      summary: Record a completed practice exam attempt for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAttemptBody"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptRecord"

  /subscription/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscription]
      summary: Get available subscription plans from Stripe
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /subscription/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscription]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"

  /subscription/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscription]
      summary: Get current user subscription status
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"

  /subscription/portal:
    post:
      operationId: createPortalSession
      tags: [subscription]
      summary: Create a Stripe Customer Portal session
      responses:
        "200":
          description: Customer portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSessionResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        config:
          $ref: "#/components/schemas/HealthConfig"
      required:
        - status
        - config

    HealthConfig:
      type: object
      description: Resolved tunables in effect for this process. Lets operators
        verify that environment overrides took effect without having to trigger
        the relevant code path.
      properties:
        clientErrorsRateLimit:
          $ref: "#/components/schemas/ClientErrorsRateLimitConfig"
        clientErrorsRateLimitCleanup:
          $ref: "#/components/schemas/ClientErrorsRateLimitCleanupConfig"
      required:
        - clientErrorsRateLimit
        - clientErrorsRateLimitCleanup

    ClientErrorsRateLimitConfig:
      type: object
      description: Per-IP throttle applied to POST /api/client-errors. Defaults
        to a 60 000 ms window with 30 requests; overridable via
        CLIENT_ERRORS_RATE_LIMIT_WINDOW_MS and CLIENT_ERRORS_RATE_LIMIT_MAX.
      properties:
        windowMs:
          type: integer
          description: Sliding window length, in milliseconds.
        limit:
          type: integer
          description: Max requests per IP per window before responding with 429.
      required:
        - windowMs
        - limit

    ClientErrorsRateLimitCleanupConfig:
      type: object
      description: Background sweeper that prunes expired rows from
        client_error_rate_hits / client_error_rate_warnings. Defaults to one
        sliding-window length; overridable via
        CLIENT_ERRORS_RATE_LIMIT_CLEANUP_INTERVAL_MS.
      properties:
        intervalMs:
          type: integer
          description: How often the background sweeper runs, in milliseconds.
      required:
        - intervalMs

    Topic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        description:
          type: string
        flashcardCount:
          type: integer
        quizCount:
          type: integer
        examQuestionCount:
          type: integer
          description: Number of questions linked to this topic's practice exam (used to clamp the question-count picker).
      required:
        - id
        - name
        - category
        - description
        - flashcardCount
        - quizCount

    Flashcard:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        question:
          type: string
        answer:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
      required:
        - id
        - topicId
        - question
        - answer
        - difficulty

    QuizQuestion:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        question:
          type: string
        optionA:
          type: string
        optionB:
          type: string
        optionC:
          type: string
        optionD:
          type: string
        correctAnswer:
          type: string
          enum: [A, B, C, D]
        explanation:
          type: string
      required:
        - id
        - topicId
        - question
        - optionA
        - optionB
        - optionC
        - optionD
        - correctAnswer
        - explanation

    StudyGuide:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        content:
          type: string
      required:
        - id
        - topicId
        - title
        - content

    PracticeExam:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        timeLimit:
          type: ["integer", "null"]
          description: "Total exam time budget in seconds. 0 or null means the exam is untimed."
        availableCount:
          type: integer
          description: "How many questions are actually linked to this topic's exam. Use to clamp the client-side question-count picker."
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - id
        - topicId
        - title
        - questions

    CourseMasteryExam:
      type: object
      properties:
        category:
          type: string
        title:
          type: string
        passingScore:
          type: integer
          description: "Percentage required to pass the mastery exam (90)."
        timeLimit:
          type: ["integer", "null"]
          description: "Total exam time budget in seconds. 0 or null means untimed."
        availableCount:
          type: integer
          description: "Total quiz questions pooled across the course's topics."
        totalTopics:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - category
        - title
        - passingScore
        - availableCount
        - questions

    CourseMasteryLesson:
      type: object
      properties:
        topicId:
          type: integer
        name:
          type: string
        bestExamPct:
          type: ["integer", "null"]
          description: "Best practice-exam percentage the user has scored on this lesson, or null if never attempted."
        passed:
          type: boolean
          description: "True when bestExamPct >= 90."
      required:
        - topicId
        - name
        - bestExamPct
        - passed

    CourseMasteryStatus:
      type: object
      properties:
        category:
          type: string
        unlocked:
          type: boolean
          description: "True when every lesson's practice exam has been passed at >= 90%."
        mastered:
          type: boolean
          description: "True when the Course Mastery Exam has been passed at >= 90%."
        passingScore:
          type: integer
          description: "Percentage required to pass the mastery exam (90)."
        totalTopics:
          type: integer
        passedTopics:
          type: integer
          description: "Number of lessons whose practice exam has been passed at >= 90%."
        bestMasteryScore:
          type: ["integer", "null"]
          description: "Best Course Mastery Exam percentage, or null if never attempted."
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/CourseMasteryLesson"
      required:
        - category
        - unlocked
        - mastered
        - passingScore
        - totalTopics
        - passedTopics
        - bestMasteryScore
        - lessons

    RecordCourseMasteryAttemptBody:
      type: object
      properties:
        category:
          type: string
        score:
          type: integer
          description: "Percentage score (0-100)."
        correct:
          type: integer
        total:
          type: integer
      required:
        - category
        - score
        - correct
        - total

    CourseMasteryAttemptRecord:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        score:
          type: integer
        correct:
          type: integer
        total:
          type: integer
        passed:
          type: boolean
        completedAt:
          type: string
      required:
        - id
        - category
        - score
        - correct
        - total
        - passed
        - completedAt

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        goal:
          type: ["string", "null"]
        degree:
          type: ["string", "null"]
        referralSource:
          type: ["string", "null"]
        subscriptionStatus:
          type: string
        onboardingComplete:
          type: boolean
        stripeCustomerId:
          type: ["string", "null"]
        stripeSubscriptionId:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - subscriptionStatus
        - onboardingComplete

    UpsertUserProfileBody:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
        goal:
          type: string
        degree:
          type: string
        referralSource:
          type: string
        onboardingComplete:
          type: boolean

    UsageInfo:
      type: object
      properties:
        usageCount:
          type: integer
        freeLimit:
          type: integer
        isOverLimit:
          type: boolean
      required:
        - usageCount
        - freeLimit
        - isOverLimit

    TopicProgress:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        topicId:
          type: integer
        topicName:
          type: string
        score:
          type: integer
        lastAccessed:
          type: string
      required:
        - id
        - userId
        - topicId
        - topicName
        - score
        - lastAccessed

    UpdateTopicProgressBody:
      type: object
      properties:
        score:
          type: integer
      required:
        - score

    DashboardSummary:
      type: object
      properties:
        totalTopics:
          type: integer
        topicsStudied:
          type: integer
        topicsCompleted:
          type: integer
        quizzesCompleted:
          type: integer
        examsCompleted:
          type: integer
        currentStreak:
          type: integer
        averageScore:
          type: integer
        recentTopics:
          type: array
          items:
            $ref: "#/components/schemas/TopicProgress"
        weakAreas:
          type: array
          items:
            $ref: "#/components/schemas/TopicProgress"
        weeklyActivity:
          type: array
          description: "Last 7 days (Sun→Sat of current week) with active flag based on any progress/quiz/exam activity recorded that day."
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
              active:
                type: boolean
            required:
              - date
              - active
        subscriptionStatus:
          type: string
        usageCount:
          type: integer
        freeLimit:
          type: integer
      required:
        - totalTopics
        - topicsStudied
        - topicsCompleted
        - quizzesCompleted
        - examsCompleted
        - currentStreak
        - averageScore
        - recentTopics
        - weeklyActivity
        - weakAreas
        - subscriptionStatus
        - usageCount
        - freeLimit

    RecordAttemptBody:
      type: object
      properties:
        topicId:
          type: integer
        score:
          type: integer
        total:
          type: integer
      required:
        - topicId
        - score
        - total

    AttemptRecord:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        score:
          type: integer
        total:
          type: integer
        completedAt:
          type: string
      required:
        - id
        - topicId
        - score
        - total
        - completedAt

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        displayName:
          type: string
        streak:
          type: integer
        topicsCompleted:
          type: integer
        isCurrentUser:
          type: boolean
      required:
        - rank
        - displayName
        - streak
        - topicsCompleted
        - isCurrentUser

    Leaderboard:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        currentUser:
          oneOf:
            - $ref: "#/components/schemas/LeaderboardEntry"
            - type: "null"
        totalParticipants:
          type: integer
      required:
        - entries
        - totalParticipants

    SubscriptionPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        priceId:
          type: string
        unitAmount:
          type: integer
        currency:
          type: string
        interval:
          type: string
      required:
        - id
        - name
        - priceId
        - unitAmount
        - currency
        - interval

    CreateCheckoutSessionBody:
      type: object
      properties:
        priceId:
          type: string
      required:
        - priceId

    CheckoutSessionResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    PortalSessionResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    SubscriptionStatus:
      type: object
      properties:
        status:
          type: string
          description: "Stripe subscription status — e.g. 'free', 'active', 'past_due', 'canceled'."
        tier:
          type: ["string", "null"]
          description: "Product tier when active — typically 'pro' or 'scholar'. Null when status is 'free'."
        subscriptionId:
          type: ["string", "null"]
        currentPeriodEnd:
          type: ["string", "null"]
      required:
        - status

